<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Yttrandefrihet Event</title>
<style>
  body {
    margin: 0;
    font-family: Georgia, serif;
    background: #0f1013;
  }

  .overlay {
    position: fixed;
    inset: 0;
    background:
      linear-gradient(135deg, rgba(186, 28, 28, 0.28), transparent 45%),
      rgba(5, 7, 12, 0.88);
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .popup {
    width: 100%;
    height: 100%;
    display: flex;
    align-items: center;
    background:
      linear-gradient(to right, rgba(0, 0, 0, 0.92) 0%, rgba(0, 0, 0, 0.82) 34%, rgba(0, 0, 0, 0.42) 58%, rgba(0, 0, 0, 0.18) 100%),
      url('https://images.unsplash.com/photo-1515169067868-5387ec356754?q=80&w=1600&auto=format&fit=crop') center/cover no-repeat;
  }

  .content {
    padding: clamp(28px, 4vw, 56px);
    color: #f6f0e8;
    display: flex;
    flex-direction: column;
    justify-content: center;
    max-width: min(560px, 100%);
    min-height: 100%;
    box-sizing: border-box;
  }

  .eyebrow {
    display: inline-block;
    align-self: flex-start;
    margin-bottom: 22px;
    padding: 9px 15px;
    border: 1px solid rgba(255, 255, 255, 0.2);
    border-radius: 999px;
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    background: rgba(255, 255, 255, 0.08);
  }

  h1 {
    margin: 0 0 16px;
    font-size: clamp(32px, 5vw, 62px);
    line-height: 0.98;
    letter-spacing: -0.03em;
    max-width: 8.5ch;
  }

  p {
    margin: 0;
    font-size: clamp(16px, 2vw, 19px);
    line-height: 1.45;
    color: rgba(246, 240, 232, 0.88);
    max-width: 28ch;
  }

  .details {
    margin-top: 26px;
    display: flex;
    flex-wrap: wrap;
    gap: 12px;
    max-width: 460px;
  }

  .detail {
    padding: 12px 15px;
    border: 1px solid rgba(255, 255, 255, 0.14);
    background: rgba(255, 255, 255, 0.06);
    border-radius: 14px;
    font-size: 15px;
  }

  .actions {
    margin-top: 28px;
    display: flex;
    gap: 14px;
    flex-wrap: wrap;
    max-width: 520px;
  }

  .cta,
  .cta-secondary {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    min-height: 50px;
    padding: 0 22px;
    border-radius: 999px;
    text-decoration: none;
    font-size: 15px;
    font-weight: 800;
  }

  .cta {
    background: #f3c36b;
    color: #111;
  }

  .cta-secondary {
    border: 1px solid rgba(255, 255, 255, 0.24);
    color: #fff;
    background: rgba(255, 255, 255, 0.08);
  }

  @media (max-width: 900px) {
    .content {
      max-width: 100%;
      padding: 24px 20px 28px;
    }

    p {
      max-width: none;
    }

    h1 {
      max-width: none;
      font-size: clamp(34px, 11vw, 52px);
    }
  }
</style>
</head>
<body>
<div class="overlay">
  <div class="popup">
    <section class="content">
      <div class="eyebrow">Event och demonstration</div>
      <h1>För dig som står upp för yttrandefrihet</h1>
      <p>Samling, tal och manifestation för öppen debatt, fri press och rätten att uttrycka sig utan censur.</p>

      <div class="details">
        <div class="detail">Lördag 26 april</div>
        <div class="detail">14:00 till 17:00</div>
        <div class="detail">Sergels torg, Stockholm</div>
      </div>

      <div class="actions">
        <a class="cta" href="https://newsvoice.se" target="_blank" rel="noopener noreferrer">Läs mer hos NewsVoice</a>
        <a class="cta-secondary" href="https://newsvoice.se/kontakt/" target="_blank" rel="noopener noreferrer">Anmäl intresse</a>
      </div>
    </section>
  </div>
</div>
</body>
</html>
